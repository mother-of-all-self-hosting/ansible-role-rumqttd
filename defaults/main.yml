---
# Project source code URL: https://github.com/bytebeamio/rumqtt

rumqttd_enabled: true

rumqttd_identifier: rumqttd
rumqttd_base_path: "/{{ rumqttd_identifier }}"
rumqttd_config_path: "{{ rumqttd_base_path }}/config"

# renovate: datasource=docker depName=bytebeamio/rumqttd versioning=semver
rumqttd_version: 0.19.0

rumqttd_uid: ""
rumqttd_gid: ""

rumqttd_container_image: "{{ rumqttd_container_image_registry_prefix }}bytebeamio/rumqttd:{{ rumqttd_container_image_tag }}"
rumqttd_container_image_tag: "{{ rumqttd_version }}"
rumqttd_container_image_registry_prefix: "{{ rumqttd_container_image_registry_prefix_upstream }}"
rumqttd_container_image_registry_prefix_upstream: "{{ rumqttd_container_image_registry_prefix_upstream_default }}"
rumqttd_container_image_registry_prefix_upstream_default: docker.io/
rumqttd_container_image_force_pull: "{{ rumqttd_container_image.endswith(':latest') }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
rumqttd_container_network: "{{ rumqttd_identifier }}"

# Control if the container network is deleted on uninstalling.
rumqttd_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `rumqttd_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
rumqttd_container_http_host_bind_port: "{{ rumqttd_container_http_port }}"

# The port number in the container
rumqttd_container_http_port: 1883

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
rumqttd_container_additional_networks: "{{ rumqttd_container_additional_networks_auto + rumqttd_container_additional_networks_custom }}"
rumqttd_container_additional_networks_auto: []
rumqttd_container_additional_networks_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
rumqttd_container_extra_arguments: "{{ rumqttd_container_extra_arguments_auto + rumqttd_container_extra_arguments_custom }}"
rumqttd_container_extra_arguments_auto: []
rumqttd_container_extra_arguments_custom: []

# List of systemd services that the rumqttd systemd service depends on
rumqttd_systemd_required_services_list: "{{ rumqttd_systemd_required_services_list_default + rumqttd_systemd_required_services_list_auto + rumqttd_systemd_required_services_list_custom }}"
rumqttd_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
rumqttd_systemd_required_services_list_auto: []
rumqttd_systemd_required_services_list_custom: []

# List of systemd services that the rumqttd systemd service wants
rumqttd_systemd_wanted_services_list: "{{ rumqttd_systemd_wanted_services_list_default + rumqttd_systemd_wanted_services_list_auto + rumqttd_systemd_wanted_services_list_custom }}"
rumqttd_systemd_wanted_services_list_default: []
rumqttd_systemd_wanted_services_list_auto: []
rumqttd_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
rumqttd_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
rumqttd_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
rumqttd_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
rumqttd_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ rumqttd_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ rumqttd_container_stop_grace_time_seconds }} {{ rumqttd_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ rumqttd_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ rumqttd_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ rumqttd_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ rumqttd_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ rumqttd_identifier }} after {{ rumqttd_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
rumqttd_environment_variables_tz: UTC

# Additional environment variables.
rumqttd_environment_variables_additional_variables: ""

# rumqttd_restart_necessary controls whether the rumqttd systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
rumqttd_restart_necessary: false
